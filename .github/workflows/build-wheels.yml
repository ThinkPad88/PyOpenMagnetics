jobs:
  build_wheels:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build deps
        run: |
          sudo apt update
          sudo apt install gcc g++ cmake make
          export CFLAGS="-Wno-unused-variable -Wno-unused-parameter"
          export CXXFLAGS="-Wno-unused-variable -Wno-unused-parameter"
          export MAKEFLAGS="-j$(nproc)"
          pip install --upgrade pip setuptools scikit-build-core cmake build

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
