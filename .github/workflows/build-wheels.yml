name: Build PyOpenMagnetics Windows Wheel
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build_windows_wheel:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Enable NTFS Long Path Registry
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force

      - name: Checkout full repo & recursive submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Repair all git submodules
        run: |
          git submodule deinit --all -f
          git submodule sync
          git submodule update --init --recursive --force
          git submodule foreach "git clean -ffdx; git reset --hard HEAD"

      - name: Setup Node.js v22
        uses: actions/setup-node@v4

      - name: Install quicktype globally
        run: npm install -g quicktype

      - name: Load MSVC x64 dev env
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools scikit-build-core cmake build

      - name: Build wheel with schema root CMake param
        run: |
          $env:CMAKE_CXX_STANDARD = "23"
          $env:CMAKE_CXX_STANDARD_REQUIRED = "ON"
          $env:CXXFLAGS = "/W0 /bigobj"
          $env:MAKEFLAGS = "-j2"
          $env:CMAKE_FETCHCONTENT_UPDATES_DISCONNECTED = "ON"
          # 禁止quicktype访问网络schema
          $env:QUICKTYPE_ALLOW_REMOTE_SCHEMA = "false"
          # 传入项目根目录给CMake，用于定位PEAS schema
          $root = $(Get-Location)
          # 使用 scikit-build-core 0.10+ 的 cmake.define 格式
          python -m build --wheel -C"cmake.define.PEAS_SCHEMA_ROOT=$root/_deps/mkf-src/PEAS/schemas"

      - name: Upload built wheel artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist\*.whl
