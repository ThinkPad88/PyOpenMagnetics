name: Build Wheels
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v3.4.0
        env:
          # 只生成对应平台whl
          CIBW_PYTHON_VERSIONS: "3.10 3.11 3.12 3.13"
          CIBW_PLATFORMS:
            ${{ matrix.os == 'ubuntu-latest' && 'manylinux_x86_64' || 'windows_amd64' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
