name: Build PyOpenMagnetics Windows Wheel
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wheel:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      # 开启Windows长路径，解除260字符限制
      - name: Enable NTFS long path
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force

      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 安装quicktype
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install quicktype
        run: npm install -g quicktype

      # 加载MSVC编译环境
      - name: Load MSVC compiler environment
        uses: ilammy/msvc-dev-cmd@v1.13.0

      # Python 3.9
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # 编译配置：开启C++17 + MSVC告警屏蔽 + 限制线程防OOM
      - name: Build wheel package
        run: |
          # MSVC屏蔽未使用变量警告
          $env:CXXFLAGS = "/wd4101 /wd4100 /std:c++17"
          $env:CFLAGS = "/wd4101 /wd4100"
          # 强制CMake全局C++标准
          $env:CMAKE_CXX_STANDARD = "17"
          $env:CMAKE_CXX_STANDARD_REQUIRED = "ON"
          # 限制线程防止内存溢出
          $env:MAKEFLAGS = "-j2"
          # 构建目录放到短路径
          $env:CMAKE_BINARY_DIR = "D:\build_tmp"
          python -m pip install --upgrade pip setuptools scikit-build-core cmake build
          python -m build --wheel

      # 上传成品
      - name: Upload built wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist\*.whl
