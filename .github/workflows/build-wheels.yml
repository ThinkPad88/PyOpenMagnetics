jobs:
  build_wheels:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 锁定Node20，避免Node24兼容性问题

      - name: Clean build dir + install quicktype
        shell: cmd
        run: |
          if exist build rmdir /S /Q build
          npm config set registry https://registry.npmmirror.com
          npm install -g quicktype@23.0.170

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PYTHON_VERSIONS: "3.10 3.11 3.12 3.13"
          CIBW_PLATFORMS: "windows_amd64"
          # 删掉原来的 CIBW_SKIP=pp* 这一行！
