name: Build PyOpenMagnetics Windows Wheel
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wheel:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      # 开启NTFS长路径，解决260字符限制
      - name: Enable NTFS long path support
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force

      # 拉取主仓库 + 递归子模块
      - name: Checkout source with recursive submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 【核心修复1】手动完整更新MKF内部全部嵌套子模块(CAS/PEAS/cci_coords)
      - name: Full update MKF submodules
        run: |
          git submodule update --init --recursive --force
          git submodule foreach --recursive git pull origin main

      # 安装Node + quicktype（生成MAS.hpp/CAS.hpp必需）
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
      - name: Global install quicktype
        run: npm install -g quicktype

      # 加载MSVC x64编译环境
      - name: Load MSVC 18 x64 dev environment
        uses: ilammy/msvc-dev-cmd@v1.13.0

      # Python 3.9
      - name: Setup Python 3.9 x64
        uses: actions/setup-python@v5

      # 编译构建（新增防FetchContent刷新变量，对齐CMake C++23标准）
      - name: Build Windows wheel package
        run: |
          # 【核心修复2】禁止FetchContent自动删除/重新拉取源码，保留完整schema文件
          $env:FETCHCONTENT_UPDATES_DISCONNECTED = "ON"
          # 强制C++23，匹配项目CMakeLists
          $env:CMAKE_CXX_STANDARD = "23"
          $env:CMAKE_CXX_STANDARD_REQUIRED = "ON"
          # 限制线程防止OOM内存溢出
          $env:MAKEFLAGS = "-j2"
          # 短构建目录减少超长路径
          $env:CMAKE_BINARY_DIR = "D:\build_tmp"
          # 升级编译依赖
          python -m pip install --upgrade pip setuptools scikit-build-core cmake build
          # 开始打包
          python -m build --wheel

      # 上传成品whl
      - name: Upload built wheel artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist\*.whl
