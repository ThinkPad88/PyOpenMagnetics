name: Build PyOpenMagnetics Wheels
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # 拉取全部子模块CAS/PEAS

      - name: Install Node.js + quicktype
        run: |
          sudo apt update
          sudo apt install nodejs npm -y
          npm install -g quicktype

      - name: Install C++ build tools
        run: sudo apt install gcc g++ cmake make -y

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheel with environment flags
        run: |
          export CFLAGS="-Wno-unused-variable -Wno-unused-parameter"
          export CXXFLAGS="-Wno-unused-variable -Wno-unused-parameter"
          export MAKEFLAGS="-j$(nproc)"
          pip install --upgrade pip setuptools scikit-build-core cmake build
          python -m build --wheel

      - name: Upload built wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
