name: Build PyOpenMagnetics Windows Wheel
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build_windows_wheel:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Enable NTFS Long Path Registry
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force

      - name: Clean workspace completely
        run: |
          Remove-Item ./* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Checkout full repo & recursive submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Full reset & repair all git submodules
        run: |
          git clean -ffdx
          git reset --hard HEAD
          git submodule deinit --all -f
          git submodule sync
          git submodule update --init --recursive --force
          git submodule foreach "git clean -ffdx; git reset --hard"

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
      - name: Install quicktype globally
        run: npm install -g quicktype

      - name: Load MSVC x64 dev cmd
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip setuptools scikit-build-core cmake build

      - name: Build wheel with full fixes
        run: |
          # 全局CMake参数：修复FetchContent弃用警告、离线模式
          $env:CMAKE_ARGS = "-DCMAKE_POLICY_DEFAULT_CMP0169=OLD -DCMAKE_FETCHCONTENT_UPDATES_DISCONNECTED=ON -DCMAKE_CXX_STANDARD=23 -DCMAKE_CXX_STANDARD_REQUIRED=ON"
          $env:CXXFLAGS = "/W0 /bigobj"
          $env:MAKEFLAGS = "-j2"
          # 禁止quicktype联网获取schema
          $env:QUICKTYPE_ALLOW_REMOTE_SCHEMA = "false"
          $env:QUICKTYPE_BASE_DIR = "$(Get-Location)"

          # 直接调用build，cmake自动处理依赖，增加policy兼容旧FetchContent
          python -m build --wheel
      
      - name: Upload built wheel artifact
        uses: actions/upload-artifact@v4
        with:
          path: dist\*.whl
